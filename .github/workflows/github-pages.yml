name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH || '/' }}
      VITE_HEADER_LABEL: ${{ vars.VITE_HEADER_LABEL || '' }}
      VITE_HEADER_TITLE: ${{ vars.VITE_HEADER_TITLE || '' }}
      VITE_FOOTER_TEXT: ${{ vars.VITE_FOOTER_TEXT || '' }}
      VITE_HEADER_COLOR: ${{ vars.VITE_HEADER_COLOR || '' }}
      VITE_FOOTER_COLOR: ${{ vars.VITE_FOOTER_COLOR || '' }}
      VITE_PLACE_TEXT: ${{ vars.VITE_PLACE_TEXT || '' }}
      VITE_LOGO_URL: ${{ vars.VITE_LOGO_URL || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
